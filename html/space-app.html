<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Explorer App (No JavaScript)</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #0b0f33, #000);
        color: white;
        text-align: center;
        padding: 40px;
    }

    h1 {
        font-size: 42px;
        margin-bottom: 10px;
        color: #9bb8ff;
        text-shadow: 0 0 10px #4d6bff;
    }

    p.subtitle {
        color: #c7d4ff;
        margin-bottom: 40px;
        font-size: 18px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 25px;
        max-width: 900px;
        margin: auto;
    }

    /* Planet Card Container */
    .planet-card {
        position: relative;
        perspective: 1000px;
    }

    /* Hide checkbox */
    .planet-card input {
        display: none;
    }

    /* Card styling */
    .card {
        width: 100%;
        height: 200px;
        border-radius: 15px;
        background: #111;
        box-shadow: 0 0 15px rgba(255,255,255,0.2);
        cursor: pointer;
        transition: transform 0.6s;
        transform-style: preserve-3d;
        position: relative;
    }

    /* Flip when checked */
    .planet-card input:checked + .card {
        transform: rotateY(180deg);
    }

    /* Front & Back */
    .front, .back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 15px;
        text-align: center;
    }

    .front {
        font-size: 26px;
        font-weight: bold;
        color: #fff;
        background-size: cover;
        background-position: center;
        text-shadow: 0 0 10px black;
    }

    .back {
        background: rgba(255,255,255,0.1);
        transform: rotateY(180deg);
        font-size: 18px;
        color: #e0e6ff;
        padding: 20px;
    }

    /* Planet images */
    .mercury { background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg'); }
    .venus   { background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg'); }
    .earth   { background-image: url('https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg'); }
    .mars    { background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg'); }

</style>
</head>

<body>

<h1>🌌 Space Explorer</h1>
<p class="subtitle">Click a planet to flip it and reveal a cosmic fact.</p>

<div class="grid">

    <!-- Mercury -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front mercury">Mercury</div>
            <div class="back">Mercury is the fastest planet, zipping around the Sun in just 88 days.</div>
        </div>
    </label>

    <!-- Venus -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front venus">Venus</div>
            <div class="back">Venus spins backwards — the Sun rises in the west and sets in the east.</div>
        </div>
    </label>

    <!-- Earth -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front earth">Earth</div>
            <div class="back">Earth is the only planet known to support life — and 70% of it is water.</div>
        </div>
    </label>

    <!-- Mars -->
    <label class="planet-card">
        <input type="checkbox">
        <div class="card">
            <div class="front mars">Mars</div>
            <div class="back">Mars has the tallest volcano in the solar system: Olympus Mons.</div>
        </div>
    </label>
    
    <p><a href="index.html">⬅ Back to Scratch Page</a></p>


</div>

</body>
</html>
